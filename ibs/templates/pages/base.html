{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Sistema de controle de notas">
    <title>Aplicação de Controle de Notas</title>

    <!-- Importação do Bootstrap -->
    <link href="{% static 'bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Estilos personalizados para o template -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">

    <!-- Animações (se necessário) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <!-- Ícones e fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Scripts -->
    <script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
</head>
<body style="font-family: 'Poppins', sans-serif; background-color: #f4f6f9;">

<!-- Cabeçalho com estilo moderno -->
{% include 'pages/header.html' %}

<main role="main" class="container mt-5">
    <!-- Bloco de conteúdo principal -->
    {% block main_content %}
    {% endblock %}
</main>

<!-- Rodapé com estilo moderno -->
{% include 'pages/footer.html' %}

</body>
</html>
